apiVersion: batch/v1
kind: CronJob
metadata:
  name: iam-postgres-backup
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: postgres:15
            command:
            - /bin/sh
            - -c
            - |
              apt-get update && apt-get install -y s3cmd
              cat <<EOF > ~/.s3cfg
              [default]
              access_key = $AWS_ACCESS_KEY_ID
              secret_key = $AWS_SECRET_ACCESS_KEY
              host_base = us-east-1.linodeobjects.com
              host_bucket = %(bucket)s.us-east-1.linodeobjects.com
              use_https = True
              EOF
              FILE_NAME="iam_db_backup_$(date +%Y%m%d_%H%M%S).sql.gz"
              pg_dump -h iam-postgres-service -U crymall -d iam_db | gzip > /tmp/$FILE_NAME
              s3cmd put /tmp/$FILE_NAME s3://midden-db-backups/iam-service/$FILE_NAME
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: iam-secrets
                  key: password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-backup-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-backup-secret
                  key: AWS_SECRET_ACCESS_KEY
          restartPolicy: OnFailure